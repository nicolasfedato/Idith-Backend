<!doctype html>
<html lang="it"><meta charset="utf-8" />
<title>Prova SSE</title>
<style>
  body{background:#0b0f0b;color:#c6f6c6;font-family:system-ui;padding:24px}
  .card{border:2px solid #33ff66;border-radius:12px;padding:16px;margin:12px 0;background:rgba(0,0,0,.35)}
  .title{font-size:28px;font-weight:800;color:#33ff66;margin-bottom:8px}
  code{background:#111;padding:2px 6px;border-radius:6px}
  #log{white-space:pre-wrap;font-family:ui-monospace,Consolas,monospace}
</style>
<div class="title">Eventi in tempo reale</div>
<div class="card">Punto finale: <code id="endpoint"></code> <span id="status"></span></div>
<div class="card"><strong>Flusso:</strong> <span id="stream">…</span></div>
<div class="card"><strong>Messaggi</strong><div id="log"></div></div>
<script>
const session = new URLSearchParams(location.search).get('session') || 'nico-run';
const base = 'http://127.0.0.1:8888';
const url = `${base}/events?session=${encodeURIComponent(session)}`;
document.getElementById('endpoint').textContent = url;

fetch(`${base}/probe`).then(r=>{
  document.getElementById('status').textContent = ` | Server: ${r.status}`;
}).catch(e=>{
  document.getElementById('status').textContent = ' | Probe error: '+e;
});

const log = m => { document.getElementById('log').textContent += m+'\n'; };
function connect(){
  try{
    const es = new EventSource(url);
    document.getElementById('stream').textContent = 'Aperto';
    es.onmessage = ev => log('[message] '+ev.data);
    es.addEventListener('test', ev => log('[test] '+ev.data));
    es.onerror = ev => { document.getElementById('stream').textContent='Errore, retry...'; es.close(); setTimeout(connect, 1500); };
  }catch(e){
    document.getElementById('stream').textContent='Errore: '+e; setTimeout(connect,1500);
  }
}
connect();
</script>
</html>
